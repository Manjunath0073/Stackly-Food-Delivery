<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly Delivery</title>
    <link rel="preconnect"
      href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet"
        href="assets/css/style.css">

    <link rel="stylesheet"
        href="assets/css/header.css">
    <link rel="stylesheet"
        href="assets/css/login.css">
</head>
<div class="menu-overlay"></div>
<body>
<section class="auth-section">

    <div class="container">

        <div class="auth-wrapper">

            <!-- Left Side -->

            <div class="auth-content">

                <span class="auth-badge">

                    #1 Food Delivery Platform

                </span>

                <h1>

                    Delicious Food,

                    <span>Delivered Fast</span>

                </h1>

                <p>

                    Order from your favorite restaurants,
                    track deliveries in real-time and enjoy
                    exclusive offers tailored just for you.

                </p>

                <div class="auth-stats">

                    <div class="stat-box">

                        <h3 class="counter"
                            data-target="500"
                            data-suffix="+">

                            0

                        </h3>

                        <span>Restaurants</span>

                    </div>

                    <div class="stat-box">

                        <h3 class="counter"
                            data-target="50"
                            data-suffix="K+">

                            0

                        </h3>

                        <span>Happy Customers</span>

                    </div>

                    <div class="stat-box">

                        <h3 class="counter"
                            data-target="4.9"
                            data-suffix="★">

                            0

                        </h3>

                        <span>Ratings</span>

                    </div>

                </div>

            </div>

            <!-- Right Side -->

            <div class="auth-card">
                <a href="index.html" class="logo">
                    <img src="assets/images/logo-stackly.webp" alt="StacklyBite Logo">
                </a>

                <h2>

                    Sign In

                </h2>

                <form id="loginForm">

                    <div class="form-group">

                        <label>

                            Email

                        </label>

                        <input
                            type="email"
                            id="loginEmail"
                            placeholder="Enter Email">

                    </div>

                    <div class="form-group">

                        <label>

                            Role

                        </label>

                        <select id="loginRole">

                            <option value="">

                                Select Role

                            </option>

                            <option value="customer">

                                Customer

                            </option>

                            <option value="restaurant">

                                Restaurant Owner

                            </option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label>

                            Password

                        </label>

                        <input
                            type="password"
                            id="loginPassword"
                            placeholder="Enter Password">
                        
                            <div class="remember-row">

                                <label class="remember-label">

                                    <input
                                        type="checkbox"
                                        id="rememberMe">

                                    <span>Remember Me</span>

                                </label>

                                <a href="#">

                                    Forgot Password?

                                </a>

                            </div>

                    </div>

                    <button
                        type="submit"
                        class="auth-btn">

                        Login

                    </button>

                    <p class="auth-message"></p>

                    <div class="auth-footer">

                        Don't have an account?

                        <a href="signup.html">

                            Sign Up

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</section>

    <script src="assets/js/login.js"></script>
</body>
</html>
